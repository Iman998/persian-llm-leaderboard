board: leaderboard

question_col: "question"

choice_cols:
  - "option_1"
  - "option_2"
  - "option_3"
  - "option_4"
  - "option_5"
  - "option_6"
  - "option_7"
  - "option_8"
  - "option_9"
  - "option_10"

answer_col: "answer_index"
language: en

# list one or more columns whose values define categories
category_cols:
  - "topic"          # categories of question
  - "difficulty"        # sub categories of question
task: multiple_choice
metrics: [accuracy]
evaluator: evaluators/mcq_evaluator.py
prompt_template: prompts/Persian_mcq_fewshot.jinja2
description: "AutoBench (books for demo)"
