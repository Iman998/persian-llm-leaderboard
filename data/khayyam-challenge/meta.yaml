  - "Grade Title"
  - "Education Period"
task: multiple_choice
metrics: [accuracy]
evaluator: evaluators/mcq_evaluator.py
prompt_template: prompts/mcq_fewshot.jinja2
description: "Persian multiple-choice questions from the Khayyam Challenge"
